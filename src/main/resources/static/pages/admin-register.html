<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAUDSHIELD - SUPERADMIN SETUP</title>
    <meta http-equiv="refresh" content="0; url=/pages/superadmin-setup.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/login-page.css">
</head>
<body>
    <div class="bg-animation"></div>
    <script>window.location.replace('/pages/superadmin-setup.html');</script>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="scanline"></div>

            <div class="lock-icon">+</div>
            <div class="subtitle">ADMIN SETUP</div>
            <h1 class="title">CREATE ACCOUNT</h1>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">FULL NAME</label>
                    <input type="text" id="name" placeholder="Admin Name" required>
                </div>

                <div class="form-group">
                    <label for="email">ADMIN EMAIL</label>
                    <input type="email" id="email" placeholder="admin@fraudshield.com" required>
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" placeholder="Minimum 6 characters" required>
                    <button type="button" class="password-toggle" id="togglePassword">SHOW</button>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">CREATE ACCOUNT</span>
                    <div class="spinner"></div>
                </button>

                <div class="error-message" id="registerMsg"></div>
            </form>

            <div class="auth-actions">
                <a href="/pages/login.html" class="text-action text-action-link">BACK TO LOGIN</a>
                <a href="/pages/index.html" class="text-action text-action-link">BACK TO HOME</a>
            </div>
        </div>

        <div class="secure-status">
            <span class="secure-dot"></span> SECURE CONNECTION
        </div>
    </div>

    <div class="status-bar">
        <div class="status-item"><div class="green-dot"></div> SYSTEM: ONLINE</div>
        <div class="status-item">SERVER: localhost:8080</div>
        <div class="status-item">ENCRYPTION: ACTIVE</div>
    </div>

    <script src="/scripts/register-page.js"></script>
</body>
</html>
