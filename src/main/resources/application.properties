# Database connection.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/fraudshield}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Flyway migrations.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Pretty-print JSON responses.
spring.jackson.serialization.indent-output=true

# Server.
server.port=8080

# Static files (dashboard served from resources/static/).
spring.web.resources.static-locations=classpath:/static/

mail.sender.address=${MAIL_SENDER_ADDRESS:${MAIL_SENDER:no-reply@fraudshield.com}}
mail.sender.name=${MAIL_SENDER_NAME:FraudShield Alerts}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_SENDER:no-reply@fraudshield.local}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:change-me}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}

ml.api.url=${ML_API_URL:http://127.0.0.1:5000/predict}
ml.health.url=${ML_HEALTH_URL:http://127.0.0.1:5000/health}

admin.alert.email=${mail.sender.address}

# SpringDoc/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.example.infosys_project.controller
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
