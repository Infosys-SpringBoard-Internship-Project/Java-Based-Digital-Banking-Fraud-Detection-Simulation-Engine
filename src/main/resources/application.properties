# Database connection (set via environment variables).
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA and Hibernate.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Pretty-print JSON responses.
spring.jackson.serialization.indent-output=true

# Server.
server.port=${PORT:8080}

# Static files (dashboard served from resources/static/).
spring.web.resources.static-locations=classpath:/static/

# ── Global Sender
mail.sender.address=${MAIL_SENDER:${SPRING_MAIL_USERNAME:alerts@example.com}}
mail.sender.name=FraudShield Alerts

# ── Gmail SMTP config
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_SENDER:${SPRING_MAIL_USERNAME:alerts@example.com}}
spring.mail.password=${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.properties.mail.smtp.ssl.protocols=${MAIL_SMTP_SSL_PROTOCOLS:TLSv1.2}
spring.mail.properties.mail.smtp.auth.mechanisms=${MAIL_SMTP_AUTH_MECHANISMS:LOGIN PLAIN}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:20000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT_MS:20000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:20000}

# ML model serving (auto-train removed; uses existing model artifacts)

# ML service endpoints (Render/local override supported)
ml.api.url=${ML_API_URL:http://127.0.0.1:5000/predict}
ml.health.url=${ML_HEALTH_URL:http://127.0.0.1:5000/health}
