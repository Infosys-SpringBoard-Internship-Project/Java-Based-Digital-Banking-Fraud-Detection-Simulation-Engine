<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRAUDSHIELD — ADMIN ACCESS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/login-page.css">
</head>
<body>

    <div class="bg-animation"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="scanline"></div>
            
            <div class="lock-icon">🔒</div>
            <div class="subtitle">ADMIN ACCESS</div>
            <h1 class="title">FRAUDSHIELD</h1>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">ADMIN EMAIL</label>
                    <input type="email" id="email" placeholder="admin@fraudshield.com" required>
                </div>

                <div class="form-group">
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" required>
                    <button type="button" class="password-toggle" id="togglePassword">SHOW</button>
                </div>

                <div class="options-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        KEEP ME SIGNED IN
                    </label>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">AUTHENTICATE &rarr;</span>
                    <div class="spinner"></div>
                </button>

                <div class="error-message" id="errorMsg"></div>
            </form>
        </div>

        <div class="footer-links">
            <a href="/pages/index.html" class="back-link">&larr; BACK TO HOME</a>
            <span class="auth-text">Authorized personnel only</span>
        </div>

        <div class="secure-status">
            <span class="secure-dot"></span> SECURE CONNECTION
        </div>
    </div>

    <div class="status-bar">
        <div class="status-item"><div class="green-dot"></div> SYSTEM: ONLINE</div>
        <div class="status-item">SERVER: localhost:8080</div>
        <div class="status-item">ENCRYPTION: ACTIVE</div>
    </div>

    <script src="/scripts/login-page.js"></script>
</body>
</html>
